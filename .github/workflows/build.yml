name: Build Android APK v3

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK v3.1
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.5 --distribution-type=bin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: List APK output
        run: find . -name "*.apk" -type f

      - name: Upload Debug APK v2
        uses: actions/upload-artifact@v4
        with:
          name: discord-creator-v3-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: APK Download Info
        run: |
          echo "══════════════════════════════════════════════"
          echo "✅  Build v3.1 successful!"
          echo ""
          echo "📱 3 Fully-Automatic Creation Modes:"
          echo "   ◉ BROWSER  — WebView automation + anti-detect (Chrome 123-130)"
          echo "   ◉ REQUEST  — Direct Discord API, fastest, on-demand CAPTCHA"
          echo "   ◉ CHROME   — Ultra-stealth Chrome 130 fingerprint, auto token"
          echo ""
          echo "📧 Email aliasing: tanmay@gmail.com → tanmay+shop4821@gmail.com"
          echo "   40+ alias patterns — each account looks like a real unique user"
          echo ""
          echo "🔑 Token extraction: 100% automatic, zero human input needed"
          echo "   fetch/XHR intercept + localStorage polling + cookie scan"
          echo ""
          echo "📥 Download the APK:"
          echo "   Go to the 'Actions' tab in your GitHub repo,"
          echo "   click this workflow run, download artifact:"
          echo "   discord-creator-v3-debug-apk"
          echo ""
          echo "   https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "══════════════════════════════════════════════"
